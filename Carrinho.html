    <main>
        <h1>Meu Carrinho de Compras</h1>
        
        <div class="tabela-carrinho">
            <table class="tabelaCarrinho">
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Preço</th>
                        <th>Quantidade</th>
                        <th>Total</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Os produtos do carrinho aparecerão aqui -->
                </tbody>
            </table>
            
            <div class="total-carrinho">
                <div class="cardTotal">
                    Total: <span>R$ 0,00</span>
                </div>
                <button class="comprar">Finalizar Compra</button>
            </div>
        </div>
