  <main>
    <h1>Criar Conta</h1>
    <form class="formulario">
      <div class="efeito">
        <input type="text" id="nome" name="nome" placeholder=" " required>
        <label for="nome">Nome Completo</label>
      </div>
      
      <div class="efeito">
        <input type="email" id="email" name="email" placeholder=" " required>
        <label for="email">E-mail</label>
      </div>
      
      <div class="efeito">
        <input type="password" id="senha" name="senha" placeholder=" " required>
        <label for="senha">Senha</label>
      </div>
      
      <div class="efeito">
        <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder=" " required>
        <label for="confirmar-senha">Confirmar Senha</label>
      </div>
      
      <a href="login.html" button type="submit" class="login">Cadastrar</button></a>
    </form>
    
    <p>Já tem conta? <a href="login.html" class="cadastro">Entrar</a></p>
